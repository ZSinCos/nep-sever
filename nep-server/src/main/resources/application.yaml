server:
  port: 8080
  servlet:
    context-path: /nepm

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nep_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your_password}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.neusoft.nepserver.entity
  configuration:
    map-underscore-to-camel-case: true
